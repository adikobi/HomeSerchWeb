<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספר מתכונים</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="recipe-book.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-left">
                <a href="../index.html?active=recipes" class="back-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    <span>חזרה</span>
                </a>
                <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
            <div class="header-center">
                <img src="../logo.svg" alt="Logo" class="header-logo">
                <h1 class="app-title">ספר מתכונים</h1>
            </div>
            <div class="header-right"></div>
        </header>

        <div class="main-content">
            <!-- Search and Add Section -->
            <div class="search-add-section">
                <div class="search-container">
                    <input type="text" id="recipe-search-input" placeholder="חיפוש מתכונים...">
                </div>
                <div class="addScan-container">
                    <button id="add-recipe-btn" class="btn action-btn">הוסף מתכון חדש</button>
                    <button id="export-recipes-btn" class="btn action-btn">ייצא הכל ל-Word</button>
                </div>
            </div>

            <!-- Recipes List -->
            <div class="items-list">
                <div id="recipes-container"></div>
            </div>
        </div>

        <!-- Add/Edit Recipe Modal -->
        <div id="recipe-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-recipe-modal-btn">&times;</span>
                <h2 id="recipe-modal-title">הוסף מתכון חדש</h2>
                <form id="recipe-form">
                    <div class="form-group">
                        <label for="recipe-title">כותרת:</label>
                        <input type="text" id="recipe-title" required>
                    </div>
                    <div class="form-group">
                        <label for="recipe-content">תוכן המתכון:</label>
                        <textarea id="recipe-content" rows="10" required></textarea>
                    </div>
                    <button type="submit" id="save-recipe-btn" class="btn">שמור</button>
                </form>
            </div>
        </div>

        <!-- View Recipe Modal -->
        <div id="recipe-view-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-view-modal-btn">&times;</span>
                <h2 id="view-recipe-title"></h2>
                <div id="view-recipe-content"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js" type="module"></script>

    <!-- Recipe Book Scripts -->
    <script src="firebase-recipes.js" type="module"></script>
    <script src="recipe-book.js" type="module"></script>
</body>
</html>
